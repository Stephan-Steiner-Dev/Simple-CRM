<mat-card>
  <table class="user-table">
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>City</th>
    </tr>
    <tr *ngFor="let user of allUsers" [routerLink]="['/user', user.firebaseId]">
      <td>{{user.lastName}}, {{user.firstName}}</td>
      <td>{{user.email}}</td>
      <td>{{user.city}}</td>
    </tr>
  </table>
</mat-card>

<button
  (click)="openDialog()"
  matTooltipPosition="above"
  matTooltip="Add user"
  class="add-user-button"
  matFab
  color="primary"
>
  <mat-icon>add</mat-icon>
</button>
