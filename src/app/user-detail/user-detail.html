<mat-card *ngIf="user$ | async as user" class="user-detail-header">
  <img class="user-image" src="/assets/images/default-user-img.png" alt="" />
  <div class="user-details">
    <h2>{{ user.firstName }} {{ user.lastName }}</h2>
    <p>E-mail: {{ user.email }}</p>
  </div>

  <button class="addressBtn" matIconButton [matMenuTriggerFor]="addressMenu">
    <mat-icon>more_vert</mat-icon>
  </button>

  <mat-menu #addressMenu="matMenu">
    <button mat-menu-item (click)="editUserDetail()">Edit</button>
  </mat-menu>

</mat-card>

<mat-card *ngIf="user$ | async as user" class="mt-32 pos-rel">
  <mat-card-header>
    <mat-card-title>
      <h3>Address</h3>
    </mat-card-title>
    <button class="icon" matIconButton [matMenuTriggerFor]="addressMenu">
      <mat-icon>more_vert</mat-icon>
    </button>

    <mat-menu #addressMenu="matMenu">
      <button mat-menu-item (click)="editAddress()">Edit</button>
    </mat-menu>
  </mat-card-header>
  <mat-card-content class="detail-content">
    <p>{{ user.address }}</p>
    <p>{{ user.zipCode }} {{ user.city }}</p>
  </mat-card-content>
</mat-card>
