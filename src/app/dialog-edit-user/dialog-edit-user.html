<h2 mat-dialog-title>Add User</h2>
<mat-dialog-content *ngIf="user">
  <div class="name-input-container">
    <mat-form-field appearance="outline">
      <mat-label>First Name </mat-label>
      <input [disabled]="loading" [(ngModel)]="user.firstName" matInput placeholder="Add a first Name..." />
      <mat-hint>Please enter a name</mat-hint>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Last Name</mat-label>
      <input [disabled]="loading" [(ngModel)]="user.lastName" matInput placeholder="Add a last Name..." />
      <mat-hint>Please enter a name</mat-hint>
    </mat-form-field>
  </div>

  <div class="user-data-container">
    <mat-form-field appearance="outline">
      <mat-label>Birth Date</mat-label>
      <input [disabled]="loading" [(ngModel)]="user.birthDate" matInput [matDatepicker]="picker1" placeholder="Add a birthdate..."/>
      <mat-hint>Please enter a date</mat-hint>
      <mat-datepicker-toggle matIconSuffix [for]="picker1"></mat-datepicker-toggle>
      <mat-datepicker #picker1></mat-datepicker>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>E-Mail</mat-label>
      <input [disabled]="loading" [(ngModel)]="user.email" matInput placeholder="Add a E-mail..."/>
      <mat-hint>Please enter your E-mail</mat-hint>
    </mat-form-field>

  </div>
</mat-dialog-content>
<mat-dialog-actions>
  <button (click)="closeDialog()" matButton>Cancel</button>
  <button (click)="saveUser()" matButton>Save</button>
</mat-dialog-actions>
<div *ngIf="loading" class="progress-bar">
  <mat-progress-bar mode="indeterminate"></mat-progress-bar>
</div>
