<h2 mat-dialog-title>Add User</h2>
<mat-dialog-content *ngIf="user$ | async as user">
  <mat-form-field appearance="outline">
    <mat-label> Street + Housenumber</mat-label>
    <input
      [disabled]="loading"
      [(ngModel)]="user.address"
      matInput
      placeholder="Add a address..."
    />
    <mat-hint></mat-hint>
  </mat-form-field>

  <div class="city-container">
    <mat-form-field appearance="outline">
      <mat-label>Zipcode</mat-label>
      <input
        [disabled]="loading"
        [(ngModel)]="user.zipCode"
        matInput
        Placeholder="Add a zipcode..."
      />
      <mat-hint></mat-hint>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>City</mat-label>
      <input [disabled]="loading" [(ngModel)]="user.city" matInput Placeholder="add a city..." />
      <mat-hint></mat-hint>
    </mat-form-field>
  </div>
</mat-dialog-content>
<mat-dialog-actions>
  <button (click)="closeDialog()" matButton>Cancel</button>
  <button (click)="saveUser()" matButton>Save</button>
</mat-dialog-actions>
<div *ngIf="loading" class="progress-bar">
  <mat-progress-bar mode="indeterminate"></mat-progress-bar>
</div>
